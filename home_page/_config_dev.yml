# Local development overrides.
#
# GitHub Pages project sites are hosted at `/<repo>/` (so `baseurl: "/TorchLean"` is correct for
# deployment), but that breaks local preview links unless you serve under that subpath.
#
# Use with:
#   bundle _2.3.14_ exec jekyll serve --config _config.yml,_config_dev.yml --port 4001

baseurl: ""
url: "http://127.0.0.1:4001"
